<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 520" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#eef2ff"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#475569"/>
    </marker>
  </defs>
  <rect width="960" height="520" fill="url(#bg)"/>
  <text x="480" y="34" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">NightShift Architecture</text>
  <text x="480" y="56" text-anchor="middle" font-size="13" fill="#64748b">Drafts only  HITL enforced at SQLite FSM</text>

  <!-- MCP -->
  <rect x="40" y="90" width="170" height="90" rx="10" fill="#fff" stroke="#94a3b8"/>
  <text x="125" y="118" text-anchor="middle" font-size="14" font-weight="700" fill="#0f172a">MCP Mock Server</text>
  <text x="125" y="140" text-anchor="middle" font-size="11" fill="#475569">read_inbox</text>
  <text x="125" y="156" text-anchor="middle" font-size="11" fill="#475569">read_hoa_portal</text>
  <text x="125" y="172" text-anchor="middle" font-size="11" fill="#475569">read_invoices_folder</text>

  <!-- Supervisor -->
  <rect x="260" y="80" width="440" height="250" rx="14" fill="#ffffff" stroke="#6366f1" stroke-width="2"/>
  <text x="480" y="108" text-anchor="middle" font-size="15" font-weight="700" fill="#312e81">SupervisorNode (ADK graph)</text>

  <rect x="290" y="130" width="110" height="70" rx="8" fill="#ecfeff" stroke="#0891b2"/>
  <text x="345" y="158" text-anchor="middle" font-size="12" font-weight="700">Ingestion</text>
  <text x="345" y="178" text-anchor="middle" font-size="10">Agent</text>

  <rect x="425" y="130" width="110" height="70" rx="8" fill="#fef3c7" stroke="#d97706"/>
  <text x="480" y="158" text-anchor="middle" font-size="12" font-weight="700">Triage</text>
  <text x="480" y="178" text-anchor="middle" font-size="10">Flash + tools</text>

  <rect x="560" y="130" width="110" height="70" rx="8" fill="#dcfce7" stroke="#16a34a"/>
  <text x="615" y="158" text-anchor="middle" font-size="12" font-weight="700">Response</text>
  <text x="615" y="178" text-anchor="middle" font-size="10">Draft  staged</text>

  <line x1="400" y1="165" x2="425" y2="165" stroke="#475569" marker-end="url(#arrow)"/>
  <line x1="535" y1="165" x2="560" y2="165" stroke="#475569" marker-end="url(#arrow)"/>

  <rect x="300" y="230" width="360" height="78" rx="8" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="480" y="252" text-anchor="middle" font-size="12" font-weight="700" fill="#334155">Security + Observability</text>
  <text x="480" y="272" text-anchor="middle" font-size="11" fill="#475569">Red-team inbound scan · Blue/Green draft validation</text>
  <text x="480" y="290" text-anchor="middle" font-size="11" fill="#475569">OpenTelemetry per-item spans · PII redaction in traces/logs</text>

  <!-- Memory -->
  <rect x="740" y="130" width="180" height="90" rx="10" fill="#fff" stroke="#94a3b8"/>
  <text x="830" y="160" text-anchor="middle" font-size="14" font-weight="700">Memory Store</text>
  <text x="830" y="182" text-anchor="middle" font-size="11" fill="#475569">tenant  property lookup</text>
  <text x="830" y="198" text-anchor="middle" font-size="11" fill="#475569">personality notes (read-only)</text>

  <line x1="210" y1="135" x2="290" y2="155" stroke="#475569" marker-end="url(#arrow)"/>
  <line x1="670" y1="165" x2="740" y2="165" stroke="#475569" marker-end="url(#arrow)"/>
  <line x1="535" y1="165" x2="560" y2="165" stroke="#475569"/>

  <!-- DB + UI -->
  <rect x="260" y="360" width="200" height="90" rx="10" fill="#fff" stroke="#334155" stroke-width="2"/>
  <text x="360" y="392" text-anchor="middle" font-size="14" font-weight="700">SQLite HITL DB</text>
  <text x="360" y="414" text-anchor="middle" font-size="11" fill="#475569">drafts · failed_items</text>
  <text x="360" y="432" text-anchor="middle" font-size="11" fill="#475569">FSM: no staged  send</text>

  <rect x="500" y="360" width="200" height="90" rx="10" fill="#fff" stroke="#1d4ed8" stroke-width="2"/>
  <text x="600" y="392" text-anchor="middle" font-size="14" font-weight="700">Manager UI + API</text>
  <text x="600" y="414" text-anchor="middle" font-size="11" fill="#475569">Approve · Reject · Snooze</text>
  <text x="600" y="432" text-anchor="middle" font-size="11" fill="#475569">Morning Brief (RED first)</text>

  <line x1="480" y1="330" x2="360" y2="360" stroke="#475569" marker-end="url(#arrow)"/>
  <line x1="520" y1="330" x2="600" y2="360" stroke="#475569" marker-end="url(#arrow)"/>
  <line x1="600" y1="360" x2="480" y2="330" stroke="#475569" stroke-dasharray="4 4"/>

  <text x="480" y="498" text-anchor="middle" font-size="12" font-weight="600" fill="#0f172a">NightShift drafts. It never sends — no send path in phase 1; DB enforces manager approval.</text>
</svg>
