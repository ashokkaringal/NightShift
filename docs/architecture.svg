<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 600" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#eef2ff"/>
    </linearGradient>
    <marker id="mGrey" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#475569"/></marker>
    <marker id="mPurple" markerWidth="10" markerHeight="10" refX="9" refY="4" orient="auto"><path d="M0,0 L9,4 L0,8 Z" fill="#4338ca"/></marker>
    <marker id="mTeal" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#0891b2"/></marker>
    <marker id="mOrange" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#ea580c"/></marker>
    <marker id="mBlue" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#1d4ed8"/></marker>
    <marker id="mArrBlue" markerWidth="10" markerHeight="10" refX="8" refY="4" orient="auto"><path d="M0,0 L9,4 L0,8 Z" fill="#3b82f6"/></marker>
    <marker id="mArrNavy" markerWidth="10" markerHeight="10" refX="8" refY="4" orient="auto"><path d="M0,0 L9,4 L0,8 Z" fill="#1e3a8a"/></marker>
    <marker id="mArrOrange" markerWidth="10" markerHeight="10" refX="8" refY="4" orient="auto"><path d="M0,0 L9,4 L0,8 Z" fill="#ea580c"/></marker>
    <marker id="mViolet" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#7c3aed"/></marker>
    <g id="ico-server"><rect x="0" y="0" width="32" height="9" rx="1" fill="#64748b"/><rect x="0" y="11" width="32" height="9" rx="1" fill="#64748b"/><rect x="0" y="22" width="32" height="9" rx="1" fill="#64748b"/><circle cx="27" cy="4.5" r="1.5" fill="#22c55e"/><circle cx="27" cy="15.5" r="1.5" fill="#22c55e"/><circle cx="27" cy="26.5" r="1.5" fill="#22c55e"/></g>
    <g id="ico-mail"><rect x="2" y="6" width="22" height="14" rx="2" fill="none" stroke="#0891b2" stroke-width="1.8"/><path d="M2 8 L12 15 L22 8" fill="none" stroke="#0891b2" stroke-width="1.8"/></g>
    <g id="ico-house"><path d="M12 2 L3 10 h3 v10 h12 V10 h3 Z" fill="none" stroke="#0891b2" stroke-width="1.8" stroke-linejoin="round"/></g>
    <g id="ico-inv"><rect x="5" y="2" width="14" height="18" rx="1.5" fill="none" stroke="#0891b2" stroke-width="1.8"/><text x="12" y="14" text-anchor="middle" font-size="9" fill="#0891b2">$</text></g>
    <g id="ico-net"><circle cx="14" cy="14" r="11" fill="none" stroke="#6366f1" stroke-width="2"/><circle cx="14" cy="14" r="3.5" fill="#6366f1"/><line x1="14" y1="3" x2="14" y2="7" stroke="#6366f1" stroke-width="2"/><line x1="14" y1="21" x2="14" y2="25" stroke="#6366f1" stroke-width="2"/><line x1="3" y1="14" x2="7" y2="14" stroke="#6366f1" stroke-width="2"/><line x1="21" y1="14" x2="25" y2="14" stroke="#6366f1" stroke-width="2"/></g>
    <g id="ico-ing"><rect x="3" y="4" width="22" height="16" rx="2" fill="none" stroke="#0891b2" stroke-width="2"/><path d="M14 8 v10 M10 14 l4 4 4-4" fill="none" stroke="#0891b2" stroke-width="2" stroke-linecap="round"/></g>
    <g id="ico-brain"><path d="M14 4 C7 4 5 9 5 13 c0 5 3 9 9 9 0-7 4-9 9-9 2 0 5-2 5-5 0-5-5-9-14-4z" fill="none" stroke="#d97706" stroke-width="2"/><circle cx="9" cy="12" r="1.3" fill="#d97706"/><circle cx="19" cy="12" r="1.3" fill="#d97706"/></g>
    <g id="ico-resp"><rect x="5" y="2" width="16" height="22" rx="2" fill="none" stroke="#16a34a" stroke-width="2"/><line x1="9" y1="12" x2="17" y2="12" stroke="#16a34a" stroke-width="1.5"/><line x1="9" y1="16" x2="15" y2="16" stroke="#16a34a" stroke-width="1.5"/><path d="M17 2 l4 4 v18 H5 V2 h12" fill="none" stroke="#16a34a" stroke-width="1.2"/></g>
    <g id="ico-gem"><path d="M16 3 l12 22 H4 Z" fill="none" stroke="#4285f4" stroke-width="2" stroke-linejoin="round"/><path d="M16 3 l5 12 H11 Z" fill="#4285f4" opacity=".3"/></g>
    <g id="ico-db"><ellipse cx="16" cy="7" rx="13" ry="4.5" fill="none" stroke="#16a34a" stroke-width="2"/><path d="M3 7 v14 c0 2.5 5.8 4.5 13 4.5 s13-2 13-4.5 V7" fill="none" stroke="#16a34a" stroke-width="2"/><ellipse cx="16" cy="14" rx="13" ry="4.5" fill="none" stroke="#16a34a" stroke-width="1.2"/></g>
    <g id="ico-lock"><rect x="11" y="15" width="10" height="8" rx="1" fill="#16a34a"/><path d="M12 15 v-3.5 a4 4 0 0 1 8 0 V15" fill="none" stroke="#16a34a" stroke-width="2"/></g>
    <g id="ico-ui"><rect x="3" y="4" width="26" height="18" rx="2" fill="none" stroke="#1d4ed8" stroke-width="2"/><line x1="9" y1="26" x2="23" y2="26" stroke="#1d4ed8" stroke-width="2"/><line x1="16" y1="22" x2="16" y2="26" stroke="#1d4ed8" stroke-width="2"/><circle cx="16" cy="13" r="5" fill="none" stroke="#1d4ed8" stroke-width="1.5"/></g>
    <g id="ico-shield"><path d="M16 2 L26 7 v8 c0 7-10 13-10 13 S6 22 6 15 V7 Z" fill="none" stroke="#334155" stroke-width="2"/><path d="M11 15 l4 4 7-7" fill="none" stroke="#334155" stroke-width="2" stroke-linecap="round"/></g>
    <g id="ico-moon"><path d="M18 3 a12 12 0 1 0 2 22 A10 10 0 1 1 18 3 z" fill="#12235c"/><path d="M30 3 l1.5 3.6 3.6 1.5 -3.6 1.5 -1.5 3.6 -1.5 -3.6 -3.6 -1.5 3.6 -1.5 z" fill="#12235c"/></g>
    <g id="ico-check"><circle cx="8" cy="8" r="7" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/><path d="M5 8 l2 2 5-5" fill="none" stroke="#16a34a" stroke-width="1.8"/></g>
    <g id="ico-x"><circle cx="8" cy="8" r="7" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5"/><path d="M5 5 l6 6 M11 5 l-6 6" stroke="#dc2626" stroke-width="1.8"/></g>
    <g id="ico-clock"><circle cx="8" cy="8" r="7" fill="#f3e8ff" stroke="#9333ea" stroke-width="1.5"/><path d="M8 5 v4 l3 2" fill="none" stroke="#9333ea" stroke-width="1.5"/></g>
  </defs>

  <rect width="1100" height="600" fill="url(#bg)"/>

  <!-- Title -->
  <text x="535" y="28" text-anchor="middle" font-size="10" fill="#14b8a6">✦</text>
  <text x="550" y="30" text-anchor="middle" font-size="24" font-weight="700" fill="#0f172a">NightShift Architecture</text>
  <text x="565" y="28" text-anchor="middle" font-size="10" fill="#14b8a6">✦</text>
  <text x="550" y="54" text-anchor="middle" font-size="13" fill="#64748b">Drafts only · HITL enforced at SQLite FSM</text>

  <!-- MCP Mock Server -->
  <rect x="36" y="78" width="200" height="210" rx="12" fill="#fff" stroke="#94a3b8" stroke-width="1.5"/>
  <g transform="translate(120,88)"><use href="#ico-server"/></g>
  <text x="136" y="138" text-anchor="middle" font-size="14" font-weight="700" fill="#0f172a">MCP Mock Server</text>
  <g transform="translate(52,152)"><use href="#ico-mail" transform="scale(0.85)"/></g><text x="88" y="166" font-size="11" fill="#475569">read_inbox</text>
  <g transform="translate(52,176)"><use href="#ico-house" transform="scale(0.85)"/></g><text x="88" y="190" font-size="11" fill="#475569">read_hoa_portal</text>
  <g transform="translate(52,200)"><use href="#ico-inv" transform="scale(0.85)"/></g><text x="88" y="214" font-size="11" fill="#475569">read_invoices</text>
  <text x="136" y="272" text-anchor="middle" font-size="10" fill="#64748b">read-only · fixtures / HTTP</text>

  <!-- Legend (below MCP — no overlap with bottom row) -->
  <rect x="36" y="302" width="200" height="216" rx="10" fill="#fff" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="136" y="324" text-anchor="middle" font-size="12" font-weight="700" fill="#334155">Legend</text>
  <line x1="48" y1="342" x2="88" y2="342" stroke="#1e3a8a" stroke-width="3" marker-end="url(#mArrNavy)"/>
  <text x="98" y="346" font-size="10" fill="#475569">Supervisor → Agent (dispatch)</text>
  <line x1="48" y1="362" x2="88" y2="362" stroke="#0891b2" stroke-width="2.5" marker-end="url(#mTeal)"/>
  <text x="98" y="366" font-size="10" fill="#475569">Ingestion → MCP (call)</text>
  <line x1="48" y1="382" x2="88" y2="382" stroke="#475569" stroke-width="2.2" marker-end="url(#mGrey)"/>
  <text x="98" y="386" font-size="10" fill="#475569">Response → SQLite (write)</text>
  <line x1="48" y1="402" x2="88" y2="402" stroke="#ea580c" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#mOrange)"/>
  <text x="98" y="406" font-size="10" fill="#475569">Agent → Gemini (LLM)</text>
  <line x1="48" y1="422" x2="88" y2="422" stroke="#94a3b8" stroke-width="1.8" stroke-dasharray="5 4" marker-end="url(#mGrey)"/>
  <text x="98" y="426" font-size="10" fill="#475569">Memory → Agent (read)</text>
  <line x1="48" y1="442" x2="88" y2="442" stroke="#0891b2" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#mTeal)"/>
  <text x="98" y="446" font-size="10" fill="#475569">MCP → Ingestion (data)</text>
  <line x1="48" y1="462" x2="88" y2="462" stroke="#64748b" stroke-width="1.5" stroke-dasharray="4 4"/>
  <text x="98" y="466" font-size="10" fill="#475569">Cross-layer / UI read</text>
  <line x1="48" y1="482" x2="88" y2="482" stroke="#7c3aed" stroke-width="1.8" stroke-dasharray="4 3" marker-end="url(#mViolet)"/>
  <text x="98" y="486" font-size="10" fill="#475569">Offline write (consolidation)</text>
  <text x="136" y="504" text-anchor="middle" font-size="9" fill="#64748b">Agents never call each other</text>
  <text x="136" y="516" text-anchor="middle" font-size="9" fill="#64748b">ADK graph = dry-run topology</text>

  <!-- Orchestration zone (subtle group) -->
  <rect x="268" y="78" width="560" height="350" rx="14" fill="#f8faff" stroke="#c7d2fe" stroke-width="1.5"/>

  <!-- SupervisorNode: filled blue header + white body -->
  <rect x="466" y="90" width="164" height="66" rx="11" fill="#fff" stroke="#2c5cb8" stroke-width="2"/>
  <path d="M 477 90 h 142 a11 11 0 0 1 11 11 v 19 h -164 v -19 a11 11 0 0 1 11 -11 z" fill="#3b6fd4"/>
  <text x="548" y="113" text-anchor="middle" font-size="15" font-weight="800" fill="#fff">SupervisorNode</text>
  <text x="548" y="143" text-anchor="middle" font-size="12" font-weight="600" fill="#1e293b">Python Orchestrator</text>

  <!-- Supervisor → agents: dashed blue / solid navy / dashed orange -->
  <path d="M 512 156 L 366 180" fill="none" stroke="#3b82f6" stroke-width="3" stroke-dasharray="7 5" stroke-linecap="round" marker-end="url(#mArrBlue)"/>
  <path d="M 548 156 L 548 180" fill="none" stroke="#1e3a8a" stroke-width="3" stroke-linecap="round" marker-end="url(#mArrNavy)"/>
  <path d="M 584 156 L 730 180" fill="none" stroke="#ea580c" stroke-width="3" stroke-dasharray="7 5" stroke-linecap="round" marker-end="url(#mArrOrange)"/>

  <!-- Ingestion Agent (tinted header + white body) -->
  <rect x="292" y="182" width="128" height="88" rx="10" fill="#fff" stroke="#2563eb" stroke-width="1.8"/>
  <path d="M 302 182 h 108 a10 10 0 0 1 10 10 v 12 h -128 v -12 a10 10 0 0 1 10 -10 z" fill="#dbeafe"/>
  <g transform="translate(301,187)"><use href="#ico-ing" transform="scale(0.6)"/></g>
  <text x="322" y="198" font-size="9" font-weight="700" fill="#2563eb">① ingest_all</text>
  <text x="356" y="234" text-anchor="middle" font-size="12" font-weight="800" fill="#0f172a">Ingestion Agent</text>
  <text x="356" y="252" text-anchor="middle" font-size="10" font-weight="600" fill="#2563eb">MCP Client</text>

  <!-- Triage Agent -->
  <rect x="484" y="182" width="128" height="88" rx="10" fill="#fff" stroke="#d97706" stroke-width="1.8"/>
  <path d="M 494 182 h 108 a10 10 0 0 1 10 10 v 12 h -128 v -12 a10 10 0 0 1 10 -10 z" fill="#fef3c7"/>
  <g transform="translate(493,187)"><use href="#ico-brain" transform="scale(0.6)"/></g>
  <text x="514" y="198" font-size="9" font-weight="700" fill="#d97706">② triage</text>
  <text x="548" y="234" text-anchor="middle" font-size="12" font-weight="800" fill="#0f172a">Triage Agent</text>
  <text x="548" y="252" text-anchor="middle" font-size="10" font-weight="600" fill="#d97706">Flash + Tools</text>

  <!-- Response Agent -->
  <rect x="676" y="182" width="128" height="88" rx="10" fill="#fff" stroke="#16a34a" stroke-width="1.8"/>
  <path d="M 686 182 h 108 a10 10 0 0 1 10 10 v 12 h -128 v -12 a10 10 0 0 1 10 -10 z" fill="#dcfce7"/>
  <g transform="translate(685,187)"><use href="#ico-resp" transform="scale(0.6)"/></g>
  <text x="706" y="198" font-size="9" font-weight="700" fill="#16a34a">③ draft</text>
  <text x="740" y="234" text-anchor="middle" font-size="12" font-weight="800" fill="#0f172a">Response Agent</text>
  <text x="740" y="252" text-anchor="middle" font-size="10" font-weight="600" fill="#16a34a">Staged Drafts</text>

  <!-- MCP ↔ Ingestion -->
  <path d="M 292 246 L 236 246" fill="none" stroke="#0891b2" stroke-width="2.5" marker-end="url(#mTeal)"/>
  <path d="M 236 262 L 292 262" fill="none" stroke="#0891b2" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#mTeal)"/>
  <rect x="244" y="232" width="42" height="14" rx="3" fill="#fff" stroke="#99f6e4"/>
  <text x="265" y="242" text-anchor="middle" font-size="9" font-weight="700" fill="#0891b2">call</text>
  <rect x="244" y="266" width="52" height="14" rx="3" fill="#fff" stroke="#99f6e4"/>
  <text x="270" y="276" text-anchor="middle" font-size="8" fill="#0891b2">RawItem[]</text>

  <!-- Security + Observability -->
  <rect x="288" y="288" width="520" height="124" rx="10" fill="#f1f5f9" stroke="#cbd5e1"/>
  <g transform="translate(308,304)"><use href="#ico-shield"/></g>
  <text x="348" y="320" font-size="13" font-weight="700" fill="#334155">Security + Observability</text>
  <text x="348" y="340" font-size="11" fill="#475569">Red-team inbound scan — block prompt injection before triage</text>
  <text x="348" y="358" font-size="11" fill="#475569">Blue/Green output validation — cross-tenant draft leakage check</text>
  <text x="348" y="376" font-size="11" fill="#475569">OpenTelemetry per-item spans · token usage · PII redaction</text>
  <text x="348" y="394" font-size="11" fill="#475569">SQLite HITL FSM — no auto-send even if LLM is manipulated</text>

  <!-- Gemini API -->
  <rect x="852" y="78" width="212" height="138" rx="12" fill="#fff" stroke="#4285f4" stroke-width="2"/>
  <g transform="translate(942,88)"><use href="#ico-gem"/></g>
  <text x="958" y="138" text-anchor="middle" font-size="14" font-weight="700" fill="#1e40af">Gemini API</text>
  <text x="958" y="156" text-anchor="middle" font-size="11" fill="#475569">Google AI Studio</text>
  <text x="958" y="174" text-anchor="middle" font-size="11" fill="#475569">Flash ← Triage Agent</text>
  <text x="958" y="192" text-anchor="middle" font-size="11" fill="#475569">Flash ← Response Agent</text>
  <text x="958" y="210" text-anchor="middle" font-size="10" fill="#64748b">rules/templates fallback</text>

  <!-- Memory Store -->
  <rect x="852" y="232" width="212" height="108" rx="12" fill="#fff" stroke="#94a3b8" stroke-width="1.5"/>
  <g transform="translate(942,242)"><use href="#ico-db"/></g>
  <text x="958" y="292" text-anchor="middle" font-size="14" font-weight="700" fill="#0f172a">Memory Store</text>
  <text x="958" y="310" text-anchor="middle" font-size="11" fill="#475569">Key/Value lookup</text>
  <text x="958" y="326" text-anchor="middle" font-size="10" fill="#64748b">phase 1: JSON · read-only</text>

  <!-- Memory writer (offline consolidation, not agents / not mid-run) -->
  <path d="M 958 366 L 958 342" fill="none" stroke="#7c3aed" stroke-width="1.8" stroke-dasharray="4 3" marker-end="url(#mViolet)"/>
  <text x="958" y="380" text-anchor="middle" font-size="9" font-weight="700" fill="#7c3aed">write: memory/consolidate.py</text>
  <text x="958" y="392" text-anchor="middle" font-size="8" fill="#94a3b8">between batches · never mid-run</text>

  <!-- Gemini calls (agent → LLM) + Memory reads (store → agent, DFD read) -->
  <path d="M 548 270 C 680 270, 780 200, 852 165" fill="none" stroke="#ea580c" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#mOrange)"/>
  <path d="M 804 226 C 840 210, 860 200, 852 185" fill="none" stroke="#ea580c" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#mOrange)"/>
  <path d="M 852 285 C 720 322, 628 300, 552 273" fill="none" stroke="#94a3b8" stroke-width="1.8" stroke-dasharray="5 4" marker-end="url(#mGrey)"/>
  <path d="M 852 290 L 806 252" fill="none" stroke="#94a3b8" stroke-width="1.8" stroke-dasharray="5 4" marker-end="url(#mGrey)"/>

  <!-- SQLite HITL DB -->
  <rect x="268" y="448" width="248" height="108" rx="12" fill="#fff" stroke="#334155" stroke-width="2"/>
  <g transform="translate(360,460)"><use href="#ico-db"/></g>
  <g transform="translate(378,476)"><use href="#ico-lock" transform="scale(0.9)"/></g>
  <text x="392" y="516" text-anchor="middle" font-size="14" font-weight="700" fill="#0f172a">SQLite HITL DB</text>
  <text x="392" y="534" text-anchor="middle" font-size="11" fill="#475569">drafts · overnight_runs</text>
  <text x="392" y="548" text-anchor="middle" font-size="11" fill="#475569">no auto-send FSM</text>

  <!-- Manager UI -->
  <rect x="548" y="448" width="248" height="108" rx="12" fill="#fff" stroke="#1d4ed8" stroke-width="2"/>
  <g transform="translate(640,460)"><use href="#ico-ui"/></g>
  <text x="672" y="516" text-anchor="middle" font-size="14" font-weight="700" fill="#0f172a">Manager UI + API</text>
  <g transform="translate(588,530)"><use href="#ico-check" transform="scale(0.75)"/></g><text x="612" y="542" font-size="10" fill="#475569">Approve</text>
  <g transform="translate(648,530)"><use href="#ico-x" transform="scale(0.75)"/></g><text x="672" y="542" font-size="10" fill="#475569">Reject</text>
  <g transform="translate(708,530)"><use href="#ico-clock" transform="scale(0.75)"/></g><text x="732" y="542" font-size="10" fill="#475569">Snooze</text>

  <!-- Security → DB / UI -->
  <path d="M 392 412 L 392 448" fill="none" stroke="#64748b" stroke-width="1.5" stroke-dasharray="4 4"/>
  <path d="M 672 412 L 672 448" fill="none" stroke="#64748b" stroke-width="1.5" stroke-dasharray="4 4"/>

  <!-- UI → DB -->
  <path d="M 548 505 L 516 505" fill="none" stroke="#1d4ed8" stroke-width="1.8" stroke-dasharray="5 4" marker-end="url(#mBlue)"/>

  <!-- Response Agent bottom-center → SQLite (top layer — exits bottom, routes outside Security) -->
  <path d="M 728 270 L 752 270" fill="none" stroke="#475569" stroke-width="3.5" stroke-linecap="round"/>
  <circle cx="740" cy="270" r="6" fill="#475569" stroke="#fff" stroke-width="2"/>
  <path d="M 740 276 L 740 292 L 818 292 L 818 420 L 392 420 L 392 448" fill="none" stroke="#475569" stroke-width="2.6" marker-end="url(#mGrey)"/>
  <rect x="748" y="276" width="44" height="14" rx="3" fill="#fff" stroke="#cbd5e1"/>
  <text x="770" y="286" text-anchor="middle" font-size="8" font-weight="700" fill="#475569">staged</text>

  <!-- SupervisorNode → SQLite (run metadata: overnight_runs / failed_items) -->
  <circle cx="466" cy="140" r="3" fill="#64748b"/>
  <path d="M 466 140 H 240 V 436 H 320 V 448" fill="none" stroke="#64748b" stroke-width="1.8" stroke-dasharray="5 4" marker-end="url(#mGrey)"/>
  <rect x="286" y="126" width="150" height="14" rx="3" fill="#fff" stroke="#e2e8f0"/>
  <text x="361" y="136" text-anchor="middle" font-size="8" fill="#64748b">run metadata · overnight_runs</text>

  <!-- Footer -->
  <g transform="translate(240,568)"><use href="#ico-moon"/></g>
  <text x="284" y="586" text-anchor="start" font-size="13" font-weight="700" fill="#12235c"><tspan font-weight="800">NightShift drafts.</tspan> It never sends — no send path in phase 1; DB enforces manager approval.</text>
</svg>
